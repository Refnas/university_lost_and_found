<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Uploaded Items</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="style.css">
<script src="script.js" defer></script>

</head>

<body>

<div class="page-wrapper">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success">
    <div class="container d-flex align-items-center">

        <!-- BACK BUTTON -->
        <a href="index.html" class="text-white me-3 fs-5">
            <i class="bi bi-arrow-left"></i>
        </a>

        <!-- BRAND -->
        <a class="navbar-brand mb-0" href="index.html">
            University
        </a>

    </div>
</nav>

<!-- CONTENT -->
<div class="content container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Uploaded Items</h2>
        <span class="badge bg-success">Live</span>
    </div>

    <!-- ITEMS AREA -->
    <div class="items-scroll" id="itemsContainer">

        <!-- EMPTY STATE -->
        <div id="noItems" class="empty-state">
            <div id="noItems" class="empty-state d-flex flex-column justify-content-center align-items-center w-100">
            <a href="index.html" class="btn btn-success mt-2 rounded-pill px-4">Start uploading lost or found items</a>
        </div>

    </div>

</div>

</div>
