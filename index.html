<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>University Lost & Found</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet"
          href="style.css">
    <script src="script.js"
            defer></script>

</head>

<body>

    <!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">

    <div class="container">

        <a class="navbar-brand" href="#">
            University of Egypt
        </a>

        <!-- Toggle Button -->

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarTogglerDemo03"
                aria-controls="navbarTogglerDemo03"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- Navbar Links -->

        <div class="collapse navbar-collapse"
             id="navbarTogglerDemo03">

            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="search.html">Search</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="items.html">Items</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- HERO -->

<section class="hero">

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <h1>
            University Lost & Found
        </h1>

        <p>
            Report lost items, upload found items, and reconnect students with their belongings.
        </p>

        <a href="#uploadSection"
           class="btn hero-btn">
            Get Started
        </a>

    </div>

</section>

<!-- MAIN CONTAINER -->

<div class="container py-5">

    <!-- UPLOAD SECTION -->

    <div class="glass-card"
         id="uploadSection">

        <h2 class="mb-4">
            Upload Item
        </h2>

        <div class="row">

            <!-- LEFT SIDE -->

            <div class="col-md-6">

                <label class="mb-2">
                    Item Type
                </label>

                <select id="itemType"
                        class="form-select mb-4">

                    <option value="Lost">
                        Lost
                    </option>

                    <option value="Found">
                        Found
                    </option>

                </select>

                <label class="mb-2">
                    Item Name
                </label>

                <input type="text"
                       id="itemName"
                       class="form-control mb-4"
                       placeholder="Ex: iPhone 15 Pro">

                <label class="mb-2">
                    Location
                </label>

                <input type="text"
                       id="itemLocation"
                       class="form-control mb-4"
                       placeholder="Ex: Library / Classroom">

            </div>

            <!-- RIGHT SIDE -->

            <div class="col-md-6">

                <label class="mb-2">
                    Description
                </label>

                <textarea id="itemDescription"
                          class="form-control mb-4 textarea-box"
                          placeholder="Enter item details"></textarea>

            <div class="mb-4">

                <label class="form-label d-block mb-2">
                    Upload Image
                </label>

                <label class="btn btn-success d-inline-flex align-items-center gap-2">
                    <i class="bi bi-upload"></i>
                    <span>Upload Image</span>
                    <input type="file" id="itemImage" accept="image/*" hidden onchange="showFileName(this)">
                </label>

                <p id="fileName" class="text-white mt-2 mb-0"></p>

            </div>


            <a href="thank.html">
                <button onclick="addItem()"
                        class="btn upload-btn">
                    Submit Item
                </button>
            </a>

            </div>

        </div>

    </div>

<!-- FOOTER -->

<div class="footer">

    <h5>
        University Lost & Found System
    </h5>

    <p class="mb-0">
        © 2026 All Rights Reserved
    </p>

</div>
</body>

</html>
